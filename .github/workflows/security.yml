name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Audit frontend dependencies
        run: |
          npm ci
          npm audit --audit-level=critical

      - name: Audit API dependencies
        working-directory: server
        run: |
          npm install
          npm audit --audit-level=critical

  trivy:
    name: Trivy Image Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t mindcraft-frontend:scan .

      - name: Build API image
        run: docker build -f Dockerfile.api -t mindcraft-api:scan .

      - name: Scan frontend — fail on CRITICAL
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mindcraft-frontend:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

      - name: Scan API — fail on CRITICAL
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mindcraft-api:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
