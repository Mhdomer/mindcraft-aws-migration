name: Security Scan

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  trivy:
    name: Trivy Image Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f Dockerfile.frontend -t mindcraft-frontend:scan .

      - name: Build API image
        run: docker build -f Dockerfile.api -t mindcraft-api:scan .

      - name: Scan frontend — fail on CRITICAL
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: mindcraft-frontend:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL

      - name: Scan API — fail on CRITICAL
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: mindcraft-api:scan
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
